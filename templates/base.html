<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>RBAC Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="{% url 'dashboard' %}">RBAC App</a>
    <div class="ms-auto">
        {% if user.is_authenticated %}
            <span class="text-white me-3">{{ user.username }} ({{ user.get_roles|join:", " }})</span>
            <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-light">Logout</a>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-sm btn-outline-light">Login</a>
        {% endif %}
    </div>
</nav>
<div class="container mt-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
